version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cakeerp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cakeerp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cakeerp_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cakeerp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cakeerp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cakeerp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cakeerp}:${POSTGRES_PASSWORD:-cakeerp_pass}@postgres:5432/${POSTGRES_DB:-cakeerp}
      JWT_SECRET: ${JWT_SECRET:-super-secret-cake-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cakeerp-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
