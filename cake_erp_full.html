
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
.app{display:flex;height:100vh;min-height:700px;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px 16px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-logo h1{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.sidebar-logo p{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.nav-section{padding:8px 0}
.nav-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);padding:8px 16px 4px;letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-radius:0;transition:background .15s}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;border-left:2px solid #3266ad}
.nav-item i{font-size:16px;width:20px}
.main{flex:1;overflow-y:auto;background:var(--color-background-tertiary)}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:16px;font-weight:500}
.topbar-actions{display:flex;gap:8px;align-items:center}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.badge-warning{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.content{padding:20px 24px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.metric-card .label{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px}
.metric-card .value{font-size:22px;font-weight:500}
.metric-card .sub{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 18px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-header h3{font-size:14px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-size:12px;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#3266ad;color:#fff;border-color:#3266ad}
.btn-primary:hover{background:#285494}
.btn-sm{padding:4px 10px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);width:460px;max-height:90vh;overflow-y:auto}
.modal-header{padding:16px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:0.5px solid var(--color-border-tertiary);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);margin-right:4px;margin-bottom:4px}
.chart-bar-horiz{display:flex;flex-direction:column;gap:10px}
.chart-bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.chart-bar-label{width:120px;color:var(--color-text-secondary);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-track{flex:1;height:18px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:500}
.alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.alert-warning{background:var(--color-background-warning);color:var(--color-text-warning)}
.alert-danger{background:var(--color-background-danger);color:var(--color-text-danger)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-green{background:#63992a}
.dot-amber{background:#ba7517}
.dot-red{background:#e24b4a}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.stat-row:last-child{border-bottom:none}
.timeline-item{display:flex;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
</style>

let currentPage = 'dashboard';
let modal = null;

function nav(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+page);
  if(el) el.classList.add('active');
  currentPage = page;
  render(page);
}

function statusBadge(s) {
  const map = {ok:'badge-success',low:'badge-warning',critical:'badge-danger',active:'badge-success','in-progress':'badge-info',completed:'badge-success',planned:'badge-warning',available:'badge-success',expiring:'badge-warning',expired:'badge-danger'};
  const labels = {ok:'In Stock',low:'Low Stock',critical:'Critical'};
  return `<span class="badge ${map[s]||'badge-info'}">${labels[s]||s}</span>`;
}

function margin(p){return Math.round((p.price-(p.rmCost+p.laborCost+p.overhead))/p.price*100)}

function render(page) {
  const area = document.getElementById('main-area');
  if(page==='dashboard') area.innerHTML = dashboardHTML();
  else if(page==='inventory') area.innerHTML = inventoryHTML();
  else if(page==='recipes') area.innerHTML = recipesHTML();
  else if(page==='products') area.innerHTML = productsHTML();
  else if(page==='production') area.innerHTML = productionHTML();
  else if(page==='storage') area.innerHTML = storageHTML();
  bindCharts(page);
}

<thead><tr><th>Material</th><th>Required</th><th>In Stock</th><th>Status</th></tr></thead>
<tbody>
${computeMaterialReqs().map(r=>`<tr>
<td>${r.name}</td>
<td>${r.required.toFixed(2)} ${r.unit}</td>
<td>${r.stock} ${r.unit}</td>

</tr>`).join('')}

function computeMaterialReqs(){
  const planned = DB.production.filter(p=>p.status==='planned');
  const reqs = {};
  planned.forEach(plan=>{
    const product = DB.products.find(pr=>pr.id===plan.productId);
    if(!product) return;
    const recipe = DB.recipes.find(r=>r.id===product.recipeId);
    if(!recipe) return;
    recipe.ingredients.forEach(ing=>{
      const rm = DB.inventory.find(i=>i.id===ing.rmId);
      if(!rm) return;
      if(!reqs[ing.rmId]) reqs[ing.rmId]={name:rm.name,unit:rm.unit,required:0,stock:rm.stock};
      reqs[ing.rmId].required += ing.qty * plan.planned;
    });
  });
  return Object.values(reqs).map(r=>({...r,ok:r.stock>=r.required}));
}

function updateProd(id){
  const p = DB.production.find(x=>x.id===id);
  if(!p) return;
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='modal-overlay';
  overlay.innerHTML=`<div class="modal">

<div class="form-group"><label>Wastage (kg)</label><input type="number" id="wastage-input" value="${p.wastage||0}" placeholder="0.0" /></div>
<div class="form-group"><label>Status</label><select id="status-input"><option ${p.status==='planned'?'selected':''}>planned</option><option ${p.status==='in-progress'?'selected':''}>in-progress</option><option ${p.status==='completed'?'selected':''}>completed</option></select></div>
</div>
<div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProd(${id})"><i class="ti ti-check"></i>Save</button></div>
</div>`;
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal();});

function saveProd(id){
  const p = DB.production.find(x=>x.id===id);
  const actual = parseFloat(document.getElementById('actual-input').value)||0;
  const wastage = parseFloat(document.getElementById('wastage-input').value)||0;
  const status = document.getElementById('status-input').value;
  p.actual=actual; p.wastage=wastage; p.status=status;
  closeModal();
  render('production');
}

function bindCharts(page){
  if(page!=='dashboard') return;
  setTimeout(()=>{
    if(window.Chart){
      const cogsCtx = document.getElementById('cogsChart');
      if(cogsCtx && !cogsCtx._chartInstance){
        cogsCtx._chartInstance = new Chart(cogsCtx,{type:'doughnut',data:{labels:['Raw Materials','Labor','Overhead'],datasets:[{data:[52,30,18],backgroundColor:['#3266ad','#1d9e75','#ba7517'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
      }
      const trendCtx = document.getElementById('trendChart');
      if(trendCtx && !trendCtx._chartInstance){
        trendCtx._chartInstance = new Chart(trendCtx,{type:'bar',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'Units Produced',data:[18,22,15,28,24,32,19],backgroundColor:'#3266ad',borderRadius:4},{label:'Planned',data:[20,20,20,30,25,30,20],backgroundColor:'rgba(50,102,173,0.2)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(128,128,128,0.1)'}}}}});
      }
    }
  },100);
}
